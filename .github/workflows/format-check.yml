name: Format Check

on:
  pull_request:

jobs:
  format:
    name: dotnet format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Check formatting
        run: dotnet format Format.csproj --verify-no-changes --verbosity diagnostic
